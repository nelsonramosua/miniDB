name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      usecases: ${{ steps.filter.outputs.usecases }}
    steps:
      - uses: actions/checkout@v6
      - name: Detect use-case changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            usecases:
              - 'scripts/useCases/**'
              - 'scripts/ci/usecases_smoke.sh'
  style-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install style tools
        run: sudo apt-get update && sudo apt-get install -y clang-format clang-tidy make

      - name: Run style checks
        run: make lint-style

  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest] # macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y valgrind gcc redis-tools

      - name: Build (release)
        run: make

      - name: Build (debug with ASan/UBSan)
        run: make debug

      - name: Run unit tests
        run: make test

      - name: Valgrind memory check
        if: runner.os == 'Linux'
        run: make valgrind

      - name: Integration smoke test
        run: ./scripts/smoke_test.sh 7379

      - name: Persistence test
        run: make test-persistence

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t minidb:ci .

      - name: Smoke test in Docker
        run: |
          docker run -d --name kv -p 7379:6380 minidb:ci
          sleep 1
          echo -e "PING\r\n" | nc -q1 localhost 7379 || true
          docker stop kv && docker rm kv

  usecases-smoke:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.usecases == 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: scripts/useCases/go/URLShortener/go.mod

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run scalable use-case smoke checks
        run: bash scripts/ci/usecases_smoke.sh