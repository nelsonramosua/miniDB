name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      usecases: ${{ steps.filter.outputs.usecases }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect use-case changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            usecases:
              - 'scripts/useCases/**'
              - 'scripts/ci/usecases_smoke.sh'
  style-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install style tools
        run: sudo apt-get update && sudo apt-get install -y clang-format clang-tidy make

      - name: Run style checks
        run: make lint-style

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y valgrind gcc

      - name: Build (release)
        run: make

      - name: Build (debug with ASan/UBSan)
        run: make debug

      - name: Run unit tests
        run: make test

      - name: Valgrind memory check
        run: make valgrind

      - name: Integration smoke test
        run: |
          # Start server in background
          ./kvstore --port 7379 --no-persist &
          SERVER_PID=$!
          sleep 0.5

          # Use redis-cli if available, else nc
          if command -v redis-cli &>/dev/null; then
            redis-cli -p 7379 PING
            redis-cli -p 7379 SET hello world
            redis-cli -p 7379 GET hello
            redis-cli -p 7379 DEL hello
          else
            echo -e "PING\r\n" | nc -q1 localhost 7379
          fi

          kill $SERVER_PID
          wait $SERVER_PID 2>/dev/null || true

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t kvstore:ci .

      - name: Smoke test in Docker
        run: |
          docker run -d --name kv -p 7379:6380 kvstore:ci
          sleep 1
          echo -e "PING\r\n" | nc -q1 localhost 7379 || true
          docker stop kv && docker rm kv

  usecases-smoke:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.usecases == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: scripts/useCases/go/URLShortener/go.mod

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run scalable use-case smoke checks
        run: bash scripts/ci/usecases_smoke.sh